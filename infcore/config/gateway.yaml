// infcore gateway - пример конфигурации (валидируется config/schema/gateway.schema.json).
// Формат JSONC (JSON + // комментарии). Всё offline: веса локальные, egress запрещён.
{
  "server": {
    "host": "127.0.0.1",
    "port": 8080,
    "max_concurrent_requests": 8,
    "request_timeout_ms": 120000
  },
  "security": {
    "authn": "api_key",
    "rbac_enabled": true,
    // api_key поддерживает инъекцию секретов: "env:VAR" или "file:/path"
    // (см. DEPLOY.md). Ключи открытым текстом в конфиге держать нельзя -
    // здесь ссылки на переменные окружения (из EnvironmentFile / gateway.env).
    "principals": [
      { "api_key": "env:INFCORE_KEY_ADMIN", "subject": "alice",   "role": "admin" },
      { "api_key": "env:INFCORE_KEY_EMBED", "subject": "svc-embed", "role": "embeddings-only" }
    ],
    "roles": [
      { "name": "admin",           "allow_models": ["*"], "allow_endpoints": ["*"] },
      { "name": "embeddings-only", "allow_models": ["bge-m3-embed"],
        "allow_endpoints": ["/v1/embeddings", "/v1/models"] }
    ],
    "audit": { "sink": "file", "path": "/var/log/infcore/audit.log" }
  },
  "observability": { "metrics_enabled": true, "metrics_path": "/metrics" },
  "offline": { "enforce_no_egress": true },
  "runtime": {
    "llama_server_bin": "/opt/infcore/bin/llama-server",
    "port_range_start": 8100,
    "idle_timeout_ms": 300000,
    "startup_timeout_ms": 120000
  },
  "models": [
    {
      "logical_name": "qwen3-moe-a3b",
      "gguf_path": "/opt/infcore/models/qwen3-moe-a3b-Q4_K_M.gguf",
      "arch": "qwen3moe",
      "modality": "text",
      "enabled": true,
      "n_ctx": 8192,
      "n_gpu_layers": 999
    },
    {
      "logical_name": "bge-m3-embed",
      "gguf_path": "/opt/infcore/models/bge-m3-Q8_0.gguf",
      "modality": "embedding",
      "enabled": false,
      "n_ctx": 8192
    }
  ]
}
