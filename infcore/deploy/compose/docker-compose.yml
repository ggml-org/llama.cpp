# infcore - локальный стек offline-контура. Образы из внутреннего реестра.
# Сеть internal: true - без выхода в интернет (offline-инвариант).
#
# Перед запуском:
#   1. cp gateway.env.example gateway.env  и вписать реальные ключи (openssl rand -hex 32).
#   2. В своём конфиге (../../config/gateway.yaml) задать "host": "0.0.0.0" -
#      внутри контейнера gateway слушает все интерфейсы, а наружу опубликован
#      только 127.0.0.1:8080. Управляемые llama-server всё равно слушают loopback
#      внутри контейнера и требуют per-boot api-key (прямого доступа к ним нет).
services:
  gateway:
    image: registry.internal/infcore/gateway:0.1.0
    build:
      context: ../../..          # корень форка
      dockerfile: infcore/deploy/docker/Dockerfile
    volumes:
      - /opt/infcore/models:/opt/infcore/models:ro
      - ../../config/gateway.yaml:/opt/infcore/config/gateway.yaml:ro   # свой конфиг (host=0.0.0.0)
      - /var/log/infcore:/var/log/infcore          # append-only audit-журнал (на запись)
    env_file:
      - path: ./gateway.env                        # секреты для env:VAR в конфиге
        required: false
    ports: ["127.0.0.1:8080:8080"]                 # /metrics отдаётся на том же порту
    networks: [internal]
    deploy:
      resources:
        reservations:
          devices: [{ capabilities: [gpu] }]   # NVIDIA при GGML_CUDA=ON (нужен nvidia-container-toolkit)

# Опциональные компоненты РФ-контура. Не сконфигурированы (нет конфигов/томов) -
# раскомментировать и настроить при внедрении; для работы gateway не требуются.
#  angie:                       # reverse-proxy / TLS-терминация
#    image: registry.internal/angie/angie:latest
#    depends_on: [gateway]
#    ports: ["127.0.0.1:443:443"]
#    networks: [internal]
#  victoriametrics:             # сбор /metrics (scrape target: gateway:8080/metrics)
#    image: registry.internal/victoriametrics/victoria-metrics:latest
#    networks: [internal]

networks:
  internal: { driver: bridge, internal: true }
