name: WebUI Bucket Test

on:
    push:
        branches:
            - master
            - allozaur/webui-build-strategy

permissions:
    contents: read

env:
    HF_BUCKET_NAME: ${{ vars.HF_BUCKET_WEBUI_STATIC_OUTPUT }}

jobs:
    publish-webui:
        name: Publish WebUI to Hugging Face Bucket
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v6
              with:
                  fetch-depth: 0

            - name: Determine tag name
              id: tag
              uses: ./.github/actions/get-tag-name

            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: "22"
                  cache: "npm"
                  cache-dependency-path: "tools/server/webui/package-lock.json"

            - name: Install dependencies
              run: npm ci
              working-directory: tools/server/webui

            - name: Build application
              run: npm run build
              working-directory: tools/server/webui

            - name: Install Hugging Face Hub CLI
              run: pip install -U huggingface_hub

            - name: Authenticate with Hugging Face
              run: hf auth login --token ${{ secrets.HF_TOKEN_WEBUI_STATIC_OUTPUT }}

            - name: Sync built files to Hugging Face bucket
              run: |
                  # Upload the built files to the Hugging Face bucket under the release version
                  hf buckets sync tools/server/public hf://buckets/ggml-org/${{ env.HF_BUCKET_NAME }}/${{ steps.tag.outputs.name }} --delete --quiet

            - name: Verify upload
              run: |
                  # List the files in the bucket to verify the upload
                  hf buckets list hf://buckets/ggml-org/${{ env.HF_BUCKET_NAME }}/${{ steps.tag.outputs.name }} -R -h

            - name: Clean up root-level files
              run: |
                  # Clean up any old root-level files from previous non-versioned deployments
                  hf buckets rm ggml-org/${{ env.HF_BUCKET_NAME }}/index.html --yes 2>/dev/null || true
                  hf buckets rm ggml-org/${{ env.HF_BUCKET_NAME }}/bundle.js --yes 2>/dev/null || true
                  hf buckets rm ggml-org/${{ env.HF_BUCKET_NAME }}/bundle.css --yes 2>/dev/null || true
                  hf buckets rm ggml-org/${{ env.HF_BUCKET_NAME }}/loading.html --yes 2>/dev/null || true
