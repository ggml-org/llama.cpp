name: Build and Test - Hexagon Android (QDC)

# Manual trigger only. Automatic build+test on Snapdragon path changes is handled by build-android.yml.
on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.run_id }}
  cancel-in-progress: true

jobs:
  build-hexagon-android:
    uses: ./.github/workflows/build-android.yml
    permissions:
      contents: read
      packages: read
      id-token: write
