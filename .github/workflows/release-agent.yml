name: Release llama-agent

on:
  workflow_dispatch:
    inputs:
      create_release:
        description: 'Create GitHub Release with artifacts'
        required: false
        type: boolean
        default: false

env:
  BRANCH_NAME: ${{ github.head_ref || github.ref_name }}
  CMAKE_ARGS: "-DLLAMA_BUILD_EXAMPLES=OFF -DLLAMA_BUILD_TESTS=ON -DLLAMA_BUILD_TOOLS=ON -DLLAMA_BUILD_SERVER=ON -DGGML_RPC=ON"

jobs:
  macOS-arm64:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_RPATH='@loader_path' \
            -DCMAKE_BUILD_WITH_INSTALL_RPATH=ON \
            -DLLAMA_FATAL_WARNINGS=OFF \
            -DGGML_METAL_USE_BF16=ON \
            -DGGML_METAL_EMBED_LIBRARY=ON \
            -DLLAMA_BUILD_BORINGSSL=ON \
            ${{ env.CMAKE_ARGS }}
          cmake --build build --config Release -j $(sysctl -n hw.logicalcpu)

      - name: Test binary
        run: |
          ./build/bin/llama-agent --help 2>&1 | head -5
          otool -L ./build/bin/llama-agent

      - name: Run agent tests
        run: ctest --test-dir build --output-on-failure -R agent

      - name: Pack
        run: |
          BUILD_NUM=$(git rev-list --count HEAD)
          TAG="b${BUILD_NUM}"
          mkdir -p dist
          cp build/bin/llama-agent dist/
          cp build/bin/lib*.dylib dist/ 2>/dev/null || true
          cp LICENSE dist/
          cd dist && tar -czvf ../llama-agent-${TAG}-bin-macos-arm64.tar.gz .

      - uses: actions/upload-artifact@v4
        with:
          name: llama-agent-macos-arm64
          path: llama-agent-*.tar.gz

  ubuntu-x64:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libcurl4-openssl-dev

      - name: Build
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_RPATH='$ORIGIN' \
            -DCMAKE_BUILD_WITH_INSTALL_RPATH=ON \
            -DGGML_NATIVE=OFF \
            -DGGML_CPU_ALL_VARIANTS=ON \
            -DGGML_BACKEND_DL=ON \
            ${{ env.CMAKE_ARGS }}
          cmake --build build --config Release -j $(nproc)

      - name: Test binary
        run: |
          ./build/bin/llama-agent --help 2>&1 | head -5
          ldd ./build/bin/llama-agent

      - name: Run agent tests
        run: ctest --test-dir build --output-on-failure -R agent

      - name: Pack
        run: |
          BUILD_NUM=$(git rev-list --count HEAD)
          TAG="b${BUILD_NUM}"
          mkdir -p dist
          cp build/bin/llama-agent dist/
          cp build/bin/lib*.so* dist/ 2>/dev/null || true
          cp LICENSE dist/
          cd dist && tar -czvf ../llama-agent-${TAG}-bin-ubuntu-x64.tar.gz .

      - uses: actions/upload-artifact@v4
        with:
          name: llama-agent-ubuntu-x64
          path: llama-agent-*.tar.gz

  windows-x64:
    runs-on: windows-2025
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Ninja
        run: choco install ninja

      - name: Build
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvarsall.bat" x64
          cmake -S . -B build -G "Ninja Multi-Config" ^
            -D CMAKE_TOOLCHAIN_FILE=cmake/x64-windows-llvm.cmake ^
            -DLLAMA_BUILD_BORINGSSL=ON ^
            -DGGML_NATIVE=OFF ^
            -DGGML_BACKEND_DL=ON ^
            -DGGML_CPU_ALL_VARIANTS=ON ^
            -DGGML_OPENMP=ON ^
            -DLLAMA_BUILD_EXAMPLES=OFF ^
            -DLLAMA_BUILD_TESTS=ON ^
            -DLLAMA_BUILD_TOOLS=ON ^
            -DLLAMA_BUILD_SERVER=ON ^
            -DGGML_RPC=ON
          cmake --build build --config Release

      - name: Test binary
        run: |
          dir build\bin\Release\llama-agent.exe
          build\bin\Release\llama-agent.exe --help 2>&1 | Select-Object -First 5

      - name: Run agent tests
        run: ctest --test-dir build --output-on-failure -R agent -C Release

      - name: Pack
        run: |
          Copy-Item "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Redist\MSVC\14.44.35112\debug_nonredist\x64\Microsoft.VC143.OpenMP.LLVM\libomp140.x86_64.dll" .\build\bin\Release\
          7z a llama-agent-bin-win-x64.zip .\build\bin\Release\*

      - uses: actions/upload-artifact@v4
        with:
          name: llama-agent-win-x64
          path: llama-agent-bin-win-x64.zip

  release:
    if: ${{ github.event.inputs.create_release == 'true' }}
    permissions:
      contents: write
    runs-on: ubuntu-latest
    needs: [macOS-arm64, ubuntu-x64, windows-x64]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine tag
        id: tag
        run: |
          BUILD_NUM=$(git rev-list --count HEAD)
          echo "name=b${BUILD_NUM}" >> $GITHUB_OUTPUT

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -lh artifacts/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: llama-agent ${{ steps.tag.outputs.name }}
          body: |
            ## llama-agent ${{ steps.tag.outputs.name }}

            Local AI coding agent powered by llama.cpp — single binary, zero dependencies, native performance.

            ### Downloads

            | Platform | Download |
            |----------|----------|
            | macOS Apple Silicon | `llama-agent-${{ steps.tag.outputs.name }}-bin-macos-arm64.tar.gz` |
            | Linux x64 | `llama-agent-${{ steps.tag.outputs.name }}-bin-ubuntu-x64.tar.gz` |
            | Windows x64 | `llama-agent-bin-win-x64.zip` |

            ### Quick start
            ```bash
            # Extract and run
            tar -xzf llama-agent-*.tar.gz
            ./llama-agent -hf unsloth/GLM-4.7-Flash-GGUF:UD-Q4_K_XL
            ```
          files: artifacts/*

      - name: Update Homebrew tap
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.tag.outputs.name }}"
          REVISION=$(git rev-parse HEAD)

          git clone https://x-access-token:${GH_TOKEN}@github.com/gary149/homebrew-llama-agent.git tap
          cd tap

          # Update tag and revision in formula
          sed -i "s/tag:      \"b[0-9]*\"/tag:      \"${TAG}\"/" Formula/llama-agent.rb
          sed -i "s/revision: \"[a-f0-9]*\"/revision: \"${REVISION}\"/" Formula/llama-agent.rb

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/llama-agent.rb
          git diff --cached --quiet || git commit -m "llama-agent ${TAG}"
          git push
