name: apply power8 dcbt prefetch

on:
  push:
    branches:
      - power8-dcbt-prefetch

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Apply patch
        run: |
          git apply --whitespace=nowarn .github/patches/power8-dcbt-prefetch.patch
          rm .github/workflows/power8-dcbt-prefetch.yml
          rm .github/patches/power8-dcbt-prefetch.patch
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "ggml: add dcbt L2-resident prefetch for POWER weight loops"
          git push
