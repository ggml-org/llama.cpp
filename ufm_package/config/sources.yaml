# sources.yaml — Technical documentation sources for coding RAG
# Each source has a URL to crawl/fetch, a name, and a priority weight.
# higher weight = retrieved chunks rank higher when scores are equal.
# Update URLs when new versions ship. Last updated: April 2026.

sources:
